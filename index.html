async function fetchCSV() {
  try {
    const url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent(SHEET_NAME);
    const res = await fetch(url);
    if (res.ok) { const t = await res.text(); if (t && t.length > 100) return { text: t, source: "live" }; }
  } catch (e) { console.log("GViz fail:", e.message); }
  try {
    const url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv&gid=0";
    const res = await fetch(url, { redirect: "follow" });
    if (res.ok) { const t = await res.text(); if (t && t.length > 100) return { text: t, source: "csv" }; }
  } catch (e) { console.log("CSV fail:", e.message); }
  try {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKC_30NZttAPNl7kYa6jhKSRAh488wGvEbjPnWraVXll3r7DaJMsSsmcGSmNXaEWLvBHNf7O7lIPT3/pub?gid=0&single=true&output=csv";
    const res = await fetch(url);
    if (res.ok) { const t = await res.text(); if (t && t.length > 100) return { text: t, source: "csv" }; }
  } catch (e) { console.log("Pub fail:", e.message); }
  return null;
}

function parseCSV(text) {
  const lines = []; let row = []; let cur = ""; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { row.push(cur); cur = ""; }
    else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (cur !== "" || row.length > 0) { row.push(cur); lines.push(row); row = []; cur = ""; }
      if (ch === '\r' && text[i+1] === '\n') i++;
    } else { cur += ch; }
  }
  if (cur !== "" || row.length > 0) { row.push(cur); lines.push(row); }
  return lines;
}

function col(row, i) { return (row[i] || "").trim(); }

/*

 */

function csvToEvents(lines) {
  if (lines.length < 2) return [];
  const events = [];
  for (let r = 1; r < lines.length; r++) {
    const row = lines[r];
    if (!row || !row[0]) continue;
    const localidad = col(row, 0);
    if (!localidad || localidad === "LOCALIDADES" || /^\d+$/.test(localidad)) continue;
    const modalidad = parseInt(row[1]) || 0;
    const enlace = col(row, 3);
    const gestores = col(row, 4);

    // ACTIVALAB: fecha=9, hora=10, barrio=6, direccion=7, lugar=8
    if (col(row, 9)) events.push({ localidad, modalidad, tipo:"ACTIVALAB", sesiones:parseInt(row[2])||2, enlace, gestores, barrio:col(row,6), direccion:col(row,7), lugar:col(row,8), fecha:col(row,9), hora:col(row,10) });

    // ENTRENALAB: fecha=16, hora=17, barrio=13, lugar=14, direccion=15
    if (col(row, 16)) events.push({ localidad, modalidad, tipo:"ENTRENALAB", sesiones:parseInt(row[11])||2, enlace, gestores, barrio:col(row,13), direccion:col(row,15), lugar:col(row,14), fecha:col(row,16), hora:col(row,17) });

    // FUSIONLAB: fecha=23, hora=24, barrio=20, direccion=21, lugar=22
    if (col(row, 23)) events.push({ localidad, modalidad, tipo:"FUSIONLAB", sesiones:parseInt(row[18])||1, enlace, gestores, barrio:col(row,20), direccion:col(row,21), lugar:col(row,22), fecha:col(row,23), hora:col(row,24) });

    // PLAYLAB: fecha=30, hora=31, barrio=27, direccion=28, lugar=29
    if (col(row, 30)) events.push({ localidad, modalidad, tipo:"PLAYLAB", sesiones:parseInt(row[25])||1, enlace, gestores, barrio:col(row,27), direccion:col(row,28), lugar:col(row,29), fecha:col(row,30), hora:col(row,31) });
  }
  return events;
}

const MONTHS = {enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,octubre:9,noviembre:10,diciembre:11};

function parseDate(s) {
  if (!s) return null;
  let str = s.toLowerCase().trim()
    .replace("por definir","").replace("pendiente","")
    .replace("antes del ","").replace("antes de ","")
    .replace("por confirmar","")
    .trim();
  if (!str) return null;

  // Handle Google Sheets date formats like "4/8/2026" or "2026-04-08" or "04/08/2026"
  const isoMatch = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (isoMatch) return { y:parseInt(isoMatch[1]), m:parseInt(isoMatch[2])-1, d:parseInt(isoMatch[3]) };

  const usMatch = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (usMatch) return { y:parseInt(usMatch[3]), m:parseInt(usMatch[1])-1, d:parseInt(usMatch[2]) };

  // Month-only: "mayo", "abril"
  for (const [name, idx] of Object.entries(MONTHS)) { if (str === name) return { y:YEAR, m:idx, d:null, monthOnly:true }; }

  // "8 de abril", "8 abril", "abril 25"
  const m1 = str.match(/(\d{1,2})\s*(?:de\s+)?(\w+)/);
  if (m1 && MONTHS[m1[2]] !== undefined) return { y:YEAR, m:MONTHS[m1[2]], d:parseInt(m1[1]) };

  // "abril 25"
  const m1b = str.match(/(\w+)\s+(\d{1,2})/);
  if (m1b && MONTHS[m1b[1]] !== undefined) return { y:YEAR, m:MONTHS[m1b[1]], d:parseInt(m1b[2]) };

  // "26 o 27 de abril" or "26 0 27 de abril"
  const m2 = str.match(/(\d{1,2})\s*[yo0]\s*\d{1,2}\s*(?:de\s+)?(\w+)/);
  if (m2 && MONTHS[m2[2]] !== undefined) return { y:YEAR, m:MONTHS[m2[2]], d:parseInt(m2[1]) };

  // "9 y 10 de mayo", "24 de mayo y 6 de junio"
  const m3 = str.match(/(\d{1,2})\s*(?:de\s+)?(\w+)\s*y\s*\d{1,2}\s*(?:de\s+)?(\w+)/);
  if (m3 && MONTHS[m3[2]] !== undefined) return { y:YEAR, m:MONTHS[m3[2]], d:parseInt(m3[1]) };

  const m3b = str.match(/(\d{1,2})\s*y\s*\d{1,2}\s*(?:de\s+)?(\w+)/);
  if (m3b && MONTHS[m3b[2]] !== undefined) return { y:YEAR, m:MONTHS[m3b[2]], d:parseInt(m3b[1]) };

  // Fallback: find any month name
  for (const [name, idx] of Object.entries(MONTHS)) { if (str.includes(name)) return { y:YEAR, m:idx, d:null, monthOnly:true }; }
  return null;
}

function enrichEvents(events) { return events.map(e => ({...e, parsed:parseDate(e.fecha)})).filter(e => e.parsed); }

          )}
        </div>
      )}
    </div>
  );
}

      {selected && (
        <div onClick={() => setSelected(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:100, display:"flex", alignItems:"flex-end", justifyContent:"center", backdropFilter:"blur(6px)" }}>
          <div onClick={e => e.stopPropagation()} style={{ background:C.surface, borderRadius:"20px 20px 0 0", padding:"16px 16px 32px", width:"100%", maxWidth:480, maxHeight:"75vh", overflowY:"auto", border:"1px solid "+C.border, borderBottom:"none", animation:"slideUp 0.3s ease" }}>
            <div style={{ width:36, height:4, borderRadius:2, background:C.border, margin:"0 auto 14px" }}/>
            <h3 style={{ fontSize:16, fontWeight:800, marginBottom:12, letterSpacing:"-0.3px" }}>
              {selected[0] && selected[0].parsed && selected[0].parsed.d ? selected[0].parsed.d+" de "+MFULL[selected[0].parsed.m] : MFULL[selected[0]&&selected[0].parsed?selected[0].parsed.m:0]}
              <span style={{ color:C.textMuted, fontWeight:500, fontSize:13, marginLeft:8 }}>{selected.length} evento{selected.length>1?"s":""}</span>
            </h3>
            {selected.map((ev,i) => <EventCard key={i} ev={ev} expanded={true} />)}
            <button onClick={() => setSelected(null)} style={{ width:"100%", padding:12, borderRadius:12, border:"none", background:C.bg, color:C.text, fontSize:13, fontWeight:700, cursor:"pointer", marginTop:8, letterSpacing:"0.3px" }}>Cerrar</button>
          </div>
        </div>
      )}

      {/* FOOTER */}
      <div style={{ padding:"8px 20px 20px", textAlign:"center" }}>
        <p style={{ fontSize:10, color:C.textDim }}>{events.length} eventos • {locs.length} localidades • Fuente: {source==="live"?"Google Sheets (en vivo)":source==="csv"?"CSV Export":"datos embebidos"}</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
  </script>
</body>
</html>

// ── DATA FETCHING ────────────────────────────────────────────
async function fetchCSV() {
  const urls = [
    { source:"live", url:`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}` },
    { source:"csv",  url:`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0` },
  ];
  for (const {source, url} of urls) {
    try {
      const res = await fetch(url);
      if (res.ok) {
        const text = await res.text();
        if (text && text.length > 100) return { source, text };
      }
    } catch(e) {}
  }
  return null;
}

function parseCSV(text) {
  const rows=[], lines=[];
  let current="", inQuotes=false;
  for (let i=0;i<text.length;i++) {
    const ch=text[i];
    if (ch==='"') { if (inQuotes&&text[i+1]==='"'){current+='"';i++;}else inQuotes=!inQuotes; }
    else if (ch===","&&!inQuotes){rows.push(current);current="";}
    else if ((ch==="\n"||ch==="\r")&&!inQuotes){
      if(current||rows.length>0){rows.push(current);lines.push(rows.splice(0));current="";rows.length=0;}
      if(ch==="\r"&&text[i+1]==="\n")i++;
    } else current+=ch;
  }
  if(current||rows.length>0){rows.push(current);lines.push(rows.splice(0));}
  return lines;
}

function normalizeHora(h) {
  if (!h) return "";
  return h
    .replace(/\s*a\.?\s*m\.?/gi,"AM").replace(/\s*p\.?\s*m\.?/gi,"PM")
    .replace(/(\d)(AM|PM)/g,"$1 $2")
    .replace(/\s+a\s+/g," – ")
    .replace(/\s{2,}/g," ").trim();
}

function csvToEvents(lines) {
  if (lines.length < 2) return [];
  const events = [];
  let lastCtx = null;
  for (let r=1;r<lines.length;r++) {
    const row = lines[r];
    const localidad = row[0]?.trim();
    // If no localidad but there's PLAYLAB data, use last context (continuation row)
    if (!localidad || localidad === "") {
      if (lastCtx && row[30]?.trim()) {
        events.push({...lastCtx, tipo:"PLAYLAB", sesiones:parseInt(row[25])||1,
          barrio:row[27]?.trim()||"", direccion:row[28]?.trim()||"",
          lugar:row[29]?.trim()||"", fecha:row[30]?.trim(),
          hora:normalizeHora(row[31]?.trim()||"")});
      }
      continue;
    }
    if (localidad === "LOCALIDADES") continue;
    const modalidad = parseInt(row[1])||0;
    const enlace = (row[3]?.trim()||"").replace(/^Enlace:\s*/i,"").replace(/\n/g,", ").trim();
    const gestores = row[4]?.trim()||"";
    lastCtx = {localidad, modalidad, enlace, gestores};
    if (row[6]?.trim())  events.push({localidad,modalidad,tipo:"ACTIVALAB", sesiones:parseInt(row[2])||2, enlace,gestores, barrio:row[7]?.trim()||"", direccion:row[8]?.trim()||"", lugar:row[9]?.trim()||"",  fecha:row[6]?.trim(),  hora:normalizeHora(row[10]?.trim()||"")});
    if (row[16]?.trim()) events.push({localidad,modalidad,tipo:"ENTRENALAB",sesiones:parseInt(row[11])||2,enlace,gestores, barrio:row[13]?.trim()||"",direccion:row[15]?.trim()||"",lugar:row[14]?.trim()||"", fecha:row[16]?.trim(), hora:normalizeHora(row[17]?.trim()||"")});
    if (row[23]?.trim()) events.push({localidad,modalidad,tipo:"FUSIONLAB", sesiones:parseInt(row[18])||1,enlace,gestores, barrio:row[20]?.trim()||"",direccion:row[21]?.trim()||"",lugar:row[22]?.trim()||"", fecha:row[23]?.trim(), hora:normalizeHora(row[24]?.trim()||"")});
    if (row[30]?.trim()) events.push({localidad,modalidad,tipo:"PLAYLAB",   sesiones:parseInt(row[25])||1,enlace,gestores, barrio:row[27]?.trim()||"",direccion:row[28]?.trim()||"",lugar:row[29]?.trim()||"", fecha:row[30]?.trim(), hora:normalizeHora(row[31]?.trim()||"")});
  }
  return events;
}

// ── PARSING ──────────────────────────────────────────────────
const MONTHS = {enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,octubre:9,noviembre:10,diciembre:11};

function parseDate(s) {
  if (!s) return null;
  let str = s.toLowerCase().trim()
    .replace("por definir","").replace("pendiente","")
    .replace("antes del ","").replace("antes de ","")
    .replace("por confirmar","").trim();
  if (!str) return null;
  const isoMatch = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (isoMatch) return {y:parseInt(isoMatch[1]),m:parseInt(isoMatch[2])-1,d:parseInt(isoMatch[3])};
  const ddmmMatch = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (ddmmMatch) return {y:parseInt(ddmmMatch[3]),m:parseInt(ddmmMatch[2])-1,d:parseInt(ddmmMatch[1])};
  for (const [name,idx] of Object.entries(MONTHS)) { if (str===name) return {y:YEAR,m:idx,d:null,monthOnly:true}; }
  const m1 = str.match(/(\d{1,2})\s*(?:de\s+)?(\w+)/);
  if (m1&&MONTHS[m1[2]]!==undefined) return {y:YEAR,m:MONTHS[m1[2]],d:parseInt(m1[1])};
  const m1b = str.match(/(\w+)\s+(\d{1,2})/);
  if (m1b&&MONTHS[m1b[1]]!==undefined) return {y:YEAR,m:MONTHS[m1b[1]],d:parseInt(m1b[2])};
  const m2 = str.match(/(\d{1,2})\s*[yo0]\s*\d{1,2}\s*(?:de\s+)?(\w+)/);
  if (m2&&MONTHS[m2[2]]!==undefined) return {y:YEAR,m:MONTHS[m2[2]],d:parseInt(m2[1])};
  const m3b = str.match(/(\d{1,2})\s*y\s*\d{1,2}\s*(?:de\s+)?(\w+)/);
  if (m3b&&MONTHS[m3b[2]]!==undefined) return {y:YEAR,m:MONTHS[m3b[2]],d:parseInt(m3b[1])};
  for (const [name,idx] of Object.entries(MONTHS)) { if (str.includes(name)) return {y:YEAR,m:idx,d:null,monthOnly:true}; }
  return null;
}

function enrichEvents(events) { return events.map(e=>({...e,parsed:parseDate(e.fecha)})).filter(e=>e.parsed); }
function enrichParques(evs) { return evs.map(e=>({...e,parsed:parseDate(e.fecha)})).filter(e=>e.parsed); }
function enrichTalleres(evs) { return evs.map(e=>({...e,parsed:parseDate(e.fecha)})).filter(e=>e.parsed); }

function EventCard({ev, expanded=false}) {
  const t = TIPO[ev.tipo]||{bg:"#555",glow:"transparent",icon:"📌"};
  const isPending = /pendiente|por definir/i.test(ev.barrio)||/pendiente|por definir/i.test(ev.direccion);
  const displayLugar = ev.lugar&&!/pendiente|por definir/i.test(ev.lugar)?ev.lugar:null;
  const displayBarrio = ev.barrio&&!/pendiente|por definir/i.test(ev.barrio)?ev.barrio:null;
  const displayDir = ev.direccion&&!/pendiente|por definir/i.test(ev.direccion)?ev.direccion:null;
  const enlaceClean = (ev.enlace||"").replace(/^Enlace:\s*/i,"").replace(/\n/g,", ").trim();
  return (
    <div className="card-hover" style={{background:C.bg,borderRadius:12,padding:"12px 14px",marginBottom:6,border:"1px solid "+C.border,borderLeft:"3px solid "+t.bg}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{padding:"3px 8px",borderRadius:6,background:t.bg,color:"#fff",fontSize:10,fontWeight:800,letterSpacing:"0.3px",boxShadow:"0 1px 4px "+t.glow}}>{t.icon} {ev.tipo}</span>
          <span style={{padding:"3px 8px",borderRadius:6,background:C.surface,color:C.text,fontSize:10,fontWeight:600,border:"1px solid "+C.border}}>{ev.localidad}</span>
        </div>
        <span style={{fontSize:10,color:C.textDim,fontWeight:600,fontFamily:"'JetBrains Mono'"}}>{ev.sesiones}s</span>
      </div>
      <div style={{fontSize:13,fontWeight:700,color:C.text,lineHeight:1.3}}>
        {ev.fecha}{ev.hora?<span style={{color:C.textMuted,fontWeight:500}}> — {ev.hora}</span>:""}
      </div>
      {expanded&&(
        <div style={{marginTop:8}}>
          {displayLugar&&<div style={{fontSize:12,color:"#38BDF8",display:"flex",gap:4,marginBottom:3}}><span>🏠</span><span style={{fontWeight:600}}>{displayLugar}</span></div>}
          {displayBarrio&&<div style={{fontSize:12,color:C.textMuted,display:"flex",gap:4,marginBottom:3}}><span>📍</span><span>{displayBarrio}</span></div>}
          {displayDir&&<div style={{fontSize:11,color:C.textDim,marginLeft:18,marginBottom:3}}>{displayDir}</div>}
          {enlaceClean&&<div style={{fontSize:11,color:"#A78BFA",display:"flex",gap:4,marginTop:4}}><span>👤</span><span>{enlaceClean}</span></div>}
          {isPending&&<div style={{fontSize:10,color:"#FBBF24",marginTop:6,padding:"4px 8px",borderRadius:6,background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.15)",fontWeight:600}}>⚠️ Lugar pendiente por confirmar</div>}
        </div>
      )}
    </div>
  );

const RETOS_CSV_URL = "https://raw.githubusercontent.com/soy-juandi/recreolab/main/retos_idrd.csv";

async function fetchRetosCSV() {
  try {
    const res = await fetch(RETOS_CSV_URL);
    if (!res.ok) return null;
    const text = await res.text();
    if (!text || text.length < 20) return null;
    return text;
  } catch(e) { return null; }
}

function parseRetosCSV(text) {
  if (!text) return [];
  function serialToDate(n) {
    if (isNaN(n) || n < 40000) return null;
    const d = new Date(Math.round((n - 25569) * 86400 * 1000));
    return { y: d.getUTCFullYear(), m: d.getUTCMonth(), d: d.getUTCDate() };
  }
  function serialToTime(n) {
    if (isNaN(n) || n <= 0 || n >= 1) return "";
    const totalMin = Math.round(n * 1440);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    const ampm = h >= 12 ? "PM" : "AM";
    const hd = h > 12 ? h - 12 : h === 0 ? 12 : h;
    return hd + ":" + m.toString().padStart(2, "0") + " " + ampm;
  }
  // Join multi-line fields: lines starting with RETO are new records
  const rawLines = text.split("\n");
  const joined = [];
  for (let i = 0; i < rawLines.length; i++) {
    const line = rawLines[i];
    if (/^RETO \d/.test(line) || i === 0) {
      joined.push(line);
    } else if (joined.length > 0) {
      joined[joined.length - 1] += " " + line.trim();
    }
  }
  if (joined.length < 2) return [];
  const events = [];
  for (let i = 1; i < joined.length; i++) {
    const line = joined[i].trim();
    if (!line) continue;
    // CSV actual format (localidad missing from data):
    // RETO X, fecha_serial, lugar, horaI, horaC, asistP, metodologia, asistR, balance
    // Split on first commas carefully
    const parts = line.split(",");
    if (parts.length < 4) continue;
    const reto = parts[0].trim();
    const fechaVal = parts[1].trim();
    const lugar = parts[2].trim();
    // Parse fecha (serial number)
    const fechaNum = parseFloat(fechaVal);
    const parsed = serialToDate(fechaNum);
    if (!parsed) continue;
    // Extract localidad from lugar or reto context
    let localidad = lugar.split("-")[0].split("Dirección")[0].split(".")[ 0].trim();
    if (localidad.length > 30) localidad = localidad.substring(0, 30);
    // Parse horas - parts[3] and parts[4]
    let horaI = "";
    let horaC = "";
    let nextIdx = 3;
    const h1 = parseFloat(parts[3]?.trim());
    if (!isNaN(h1) && h1 > 0 && h1 < 1) {
      horaI = serialToTime(h1);
      nextIdx = 4;
    } else {
      horaI = (parts[3] || "").trim();
      nextIdx = 4;
    }
    const h2raw = (parts[nextIdx] || "").trim();
    const h2 = parseFloat(h2raw);
    if (!isNaN(h2) && h2 > 0 && h2 < 1) {
      horaC = serialToTime(h2);
      nextIdx++;
    } else if (/\d/.test(h2raw) && /[APap]/.test(h2raw)) {
      horaC = h2raw;
      nextIdx++;
    } else {
      horaC = "";
    }
    // asistP
    const asistPStr = (parts[nextIdx] || "").trim();
    const asistPN = parseInt(asistPStr) || null;
    // Rest is metodologia, asistR, balance (may have commas)
    const ejecutado = false;
    events.push({ tipo:"RETO", reto, localidad, parsed, lugar, horaInicio:horaI, horaCierre:horaC, asistP:asistPN, asistR:null, balance:"", ejecutado });
  }
  return events;
}

              const clr = PARQUE_CLR[p];
              return (
                <button key={p} className="chip" onClick={()=>setFilterParque(filterParque===p?"ALL":p)} style={{padding:"4px 10px",borderRadius:20,fontSize:10,fontWeight:700,background:filterParque===p?clr.bg:C.surface,color:filterParque===p?"#fff":C.textMuted}}>🛡️ {p}</button>
              );
            })}
          </div>

          <MonthNav month={month} setMonth={setMonth} minMonth={4} maxMonth={4}/>

          {/* Parques calendar */}
          <div style={{padding:"8px 12px"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
              {DNAMES.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:C.textDim,fontWeight:700,padding:"6px 0",letterSpacing:"0.5px"}}>{d}</div>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
              {cells.map((day,i)=>{
                if (!day) return <div key={"e"+i}/>;
                const evs = dayParques(day);
                const has = evs.length>0;
                const today = new Date();
                const isToday = today.getDate()===day&&today.getMonth()===month&&today.getFullYear()===YEAR;
                return (
                  <div key={day} onClick={()=>has&&setSelected({evs,day,tipo:"parques"})} style={{minHeight:50,borderRadius:10,background:has?C.surface:"transparent",border:isToday?"2px solid #22C55E":has?"1px solid "+C.border:"1px solid transparent",padding:4,cursor:has?"pointer":"default",transition:"all 0.15s"}}>
                    <div style={{fontSize:12,fontWeight:isToday?800:has?600:400,color:isToday?"#22C55E":has?C.text:C.textDim,textAlign:"center",marginBottom:3,fontFamily:"'JetBrains Mono'"}}>{day}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center"}}>
                      {evs.slice(0,4).map((ev,j)=><div key={j} style={{width:7,height:7,borderRadius:2,background:PARQUE_CLR[ev.parque]?.bg||"#22C55E"}}/>)}
                      {evs.length>4&&<span style={{fontSize:7,color:C.textMuted}}>+{evs.length-4}</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Parques list */}
          <div style={{padding:"8px 16px 24px"}}>
            {(()=>{
              const monthEvs = parquesList.filter(ev=>ev.parsed.m===month);
              if (monthEvs.length===0) return <div style={{textAlign:"center",padding:40,color:C.textMuted}}><div style={{fontSize:32,marginBottom:8}}>🛡️</div><p>Sin actividades con estos filtros</p></div>;
              let lastDay=-1;
              return monthEvs.map((ev,i)=>{
                const isNew = ev.parsed.d!==lastDay;
                lastDay=ev.parsed.d;
                const wd = new Date(YEAR,ev.parsed.m,ev.parsed.d).toLocaleDateString("es-CO",{weekday:"long"});
                return (
                  <div key={i}>
                    {isNew&&(
                      <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 0 6px",borderBottom:"1px solid "+C.border,marginBottom:6}}>
                        <div style={{fontSize:20,fontWeight:800,color:"#22C55E",fontFamily:"'JetBrains Mono'"}}>{ev.parsed.d}</div>
                        <div><div style={{fontSize:12,fontWeight:700,color:C.text,textTransform:"capitalize"}}>{wd}</div><div style={{fontSize:10,color:C.textMuted}}>{MFULL[ev.parsed.m]} 2026</div></div>
                      </div>
                    )}
                    <ParquesCard ev={ev}/>
                  </div>
                );
              });
            })()}
          </div>
        </div>
      )}

      {/* ═══════════════ TAB: TALLERES ═══════════════ */}
      {tab==="talleres"&&(
        <div className="fade-up">
          <div style={{margin:"12px 16px 0",borderRadius:14,background:"linear-gradient(135deg,rgba(99,102,241,0.1),rgba(236,72,153,0.05))",border:"1px solid rgba(99,102,241,0.25)",padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:28}}>🎓</span>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:"#818CF8"}}>Talleres de Innovación OAL</div>
                <div style={{fontSize:11,color:C.textMuted}}>2 grupos · 2 sesiones · Mayo {YEAR}</div>
              </div>
              <div style={{marginLeft:"auto",textAlign:"right"}}>
                <div style={{fontSize:16,fontWeight:800,color:"#818CF8",fontFamily:"'JetBrains Mono'"}}>{TALLERES.length}</div>
                <div style={{fontSize:10,color:C.textMuted}}>talleres</div>
              </div>
            </div>
          </div>

          {/* Leyenda grupos */}
          <div style={{padding:"10px 16px 0",display:"flex",gap:10,alignItems:"center"}}>
            {[1,2].map(g=>{
              const clr = TALLER_CLR[g];
              return <div key={g} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:10,borderRadius:3,background:clr.bg}}/><span style={{fontSize:11,color:C.textMuted,fontWeight:600}}>Grupo {g}</span></div>;
            })}
          </div>

          <MonthNav month={month} setMonth={setMonth} minMonth={4} maxMonth={4}/>

          {/* Calendario talleres */}
          <div style={{padding:"8px 12px"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
              {DNAMES.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:C.textDim,fontWeight:700,padding:"6px 0",letterSpacing:"0.5px"}}>{d}</div>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
              {cells.map((day,i)=>{
                if (!day) return <div key={"e"+i}/>;
                const evs = dayTalleres(day);
                const has = evs.length>0;
                const today = new Date();
                const isToday = today.getDate()===day&&today.getMonth()===month&&today.getFullYear()===YEAR;
                return (
                  <div key={day} onClick={()=>has&&setSelected({evs,day,tipo:"talleres"})} style={{minHeight:50,borderRadius:10,background:has?C.surface:"transparent",border:isToday?"2px solid #6366F1":has?"1px solid "+C.border:"1px solid transparent",padding:4,cursor:has?"pointer":"default",transition:"all 0.15s"}}>
                    <div style={{fontSize:12,fontWeight:isToday?800:has?600:400,color:isToday?"#6366F1":has?C.text:C.textDim,textAlign:"center",marginBottom:3,fontFamily:"'JetBrains Mono'"}}>{day}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center"}}>
                      {evs.map((ev,j)=><div key={j} style={{width:7,height:7,borderRadius:2,background:TALLER_CLR[ev.grupo]?.bg||"#6366F1"}}/>)}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Lista talleres */}
          <div style={{padding:"8px 16px 24px"}}>
            {talleresList.length===0
              ?<div style={{textAlign:"center",padding:40,color:C.textMuted}}><div style={{fontSize:32,marginBottom:8}}>🎓</div><p>Sin talleres</p></div>
              :talleresList.map((ev,i)=>{
                const clr = TALLER_CLR[ev.grupo]||{bg:"#6366F1"};
                const wd = new Date(YEAR,ev.parsed.m,ev.parsed.d).toLocaleDateString("es-CO",{weekday:"long"});
                return (
                  <div key={i}>
                    <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 0 6px",borderBottom:"1px solid "+C.border,marginBottom:6}}>
                      <div style={{fontSize:20,fontWeight:800,color:clr.bg,fontFamily:"'JetBrains Mono'"}}>{ev.parsed.d}</div>
                      <div><div style={{fontSize:12,fontWeight:700,color:C.text,textTransform:"capitalize"}}>{wd}</div><div style={{fontSize:10,color:C.textMuted}}>{MFULL[ev.parsed.m]} 2026</div></div>
                    </div>
                    <TallerCard ev={ev}/>
                  </div>
                );
              })
            }
          </div>
        </div>
      )}


      {/* ═══════════════ TAB: RETOS TEAM IDRD ═══════════════ */}
      {tab==="retos"&&(
        <div className="fade-up">
          {/* Banner */}
          <div style={{margin:"12px 16px 0",borderRadius:14,background:"linear-gradient(135deg,rgba(16,185,129,0.1),rgba(99,102,241,0.05))",border:"1px solid rgba(16,185,129,0.25)",padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:28}}>🏆</span>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:"#10B981"}}>Retos TEAM IDRD 2026</div>
                <div style={{fontSize:11,color:C.textMuted}}>Seguimiento por localidad · actualizado cada 6h</div>
              </div>
              <div style={{marginLeft:"auto",textAlign:"right"}}>
                <div style={{fontSize:16,fontWeight:800,color:"#10B981",fontFamily:"'JetBrains Mono'"}}>{retosEvents.length}</div>
                <div style={{fontSize:10,color:C.textMuted}}>eventos</div>
              </div>
            </div>
          </div>

          {/* Status bar */}
          <div style={{margin:"8px 16px 0",padding:"8px 12px",borderRadius:10,background:C.surface,border:"1px solid "+C.border,display:"flex",alignItems:"center",gap:8}}>
            {retosSource==="loading"&&<><span style={{fontSize:12,animation:"spin 1s linear infinite",display:"inline-block"}}>↻</span><span style={{fontSize:12,color:C.textMuted}}>Cargando desde SharePoint…</span></>}
            {retosSource==="ok"&&<><div style={{width:7,height:7,borderRadius:"50%",background:"#22C55E"}}/><span style={{fontSize:12,color:C.textMuted,flex:1}}>Datos actualizados · Power Automate cada 6h</span><button onClick={()=>{setRetosSource("idle");setRetosEvents([]);}} style={{fontSize:10,padding:"3px 8px",borderRadius:6,border:"1px solid "+C.border,background:C.bg,color:C.textMuted,cursor:"pointer"}}>↻</button></>}
            {retosSource==="error"&&<><div style={{width:7,height:7,borderRadius:"50%",background:"#EF4444"}}/><span style={{fontSize:12,color:"#EF4444",flex:1}}>No se pudo cargar el CSV — verifica la URL en RETOS_CSV_URL</span><button onClick={()=>setRetosSource("idle")} style={{fontSize:10,padding:"3px 8px",borderRadius:6,border:"1px solid "+C.border,background:C.bg,color:C.textMuted,cursor:"pointer"}}>Reintentar</button></>}
            {retosSource==="idle"&&<span style={{fontSize:12,color:C.textMuted}}>Iniciando…</span>}
          </div>

          {/* Filtros por reto */}
          {retosEvents.length>0&&(
            <div style={{padding:"10px 16px 0",display:"flex",gap:5,flexWrap:"wrap"}}>
              <button className="chip" onClick={()=>setFilterReto("ALL")} style={{padding:"4px 10px",borderRadius:20,fontSize:10,fontWeight:700,background:filterReto==="ALL"?"#10B981":C.surface,color:filterReto==="ALL"?"#fff":C.textMuted}}>TODOS</button>
              {["RETO 1","RETO 2","RETO 3","RETO 4"].map(r=>{
                const clr=RETO_CLR[r]||{bg:"#6B7280"};
                const cnt=retosEvents.filter(e=>e.reto===r).length;
                if(cnt===0) return null;
                return <button key={r} className="chip" onClick={()=>setFilterReto(filterReto===r?"ALL":r)} style={{padding:"4px 10px",borderRadius:20,fontSize:10,fontWeight:700,background:filterReto===r?clr.bg:C.surface,color:filterReto===r?"#fff":C.textMuted}}>🏆 {r} <span style={{opacity:0.7}}>({cnt})</span></button>;
              })}
            </div>
          )}

          {/* Stats row */}
          {retosEvents.length>0&&(()=>{
            const filtrados = retosEvents.filter(e=>filterReto==="ALL"||e.reto===filterReto);
            const ejecutados = filtrados.filter(e=>e.ejecutado).length;
            const pendientes = filtrados.length - ejecutados;
            return (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,margin:"10px 16px 0"}}>
                {[{label:"Total",val:filtrados.length,clr:"#10B981"},{label:"Ejecutados",val:ejecutados,clr:"#22C55E"},{label:"Pendientes",val:pendientes,clr:"#FBBF24"}].map(s=>(
                  <div key={s.label} style={{background:C.surface,borderRadius:10,padding:"10px 8px",textAlign:"center",border:"1px solid "+C.border}}>
                    <div style={{fontSize:20,fontWeight:800,color:s.clr,fontFamily:"'JetBrains Mono'"}}>{s.val}</div>
                    <div style={{fontSize:9,color:C.textMuted,fontWeight:700,letterSpacing:"0.5px",marginTop:1}}>{s.label.toUpperCase()}</div>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* Lista por mes */}
          <div style={{padding:"12px 16px 24px"}}>
            {retosEvents.length===0&&retosSource==="ok"&&<div style={{textAlign:"center",padding:40,color:C.textMuted}}><div style={{fontSize:32,marginBottom:8}}>🔍</div><p>Sin eventos registrados</p></div>}
            {(()=>{
              const filtrados = retosEvents.filter(e=>filterReto==="ALL"||e.reto===filterReto).sort((a,b)=>a.parsed.m!==b.parsed.m?a.parsed.m-b.parsed.m:a.parsed.d-b.parsed.d);
              let lastM=-1;
              return filtrados.map((ev,i)=>{
                const isNewM = ev.parsed.m!==lastM;
                lastM=ev.parsed.m;
                const wd = new Date(YEAR,ev.parsed.m,ev.parsed.d).toLocaleDateString("es-CO",{weekday:"long"});
                return (
                  <div key={i}>
                    {isNewM&&<div style={{fontSize:13,fontWeight:800,color:"#10B981",padding:"14px 0 8px",borderBottom:"1px solid "+C.border,marginBottom:8,letterSpacing:"-0.3px"}}>{MFULL[ev.parsed.m]} {YEAR}</div>}
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                      <span style={{fontSize:11,color:C.textDim,fontFamily:"'JetBrains Mono'",minWidth:20,textAlign:"right"}}>{ev.parsed.d}</span>
                      <span style={{fontSize:10,color:C.textDim,textTransform:"capitalize"}}>{wd.split(",")[0]}</span>
                    </div>
                    <RetoCard ev={ev} expanded={true}/>
                  </div>
                );
              });
            })()}
          </div>
        </div>
      )}

      {/* MODAL */}
      {selected&&(
        <div onClick={()=>setSelected(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(6px)"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"16px 16px 32px",width:"100%",maxWidth:480,maxHeight:"78vh",overflowY:"auto",border:"1px solid "+C.border,borderBottom:"none",animation:"slideUp 0.3s ease"}}>
            <div style={{width:36,height:4,borderRadius:2,background:C.border,margin:"0 auto 14px"}}/>
            <h3 style={{fontSize:16,fontWeight:800,marginBottom:12,letterSpacing:"-0.3px"}}>
              {selected.day} de {MFULL[month]}
              {selected.tipo==="combined"&&selected.recreo?.length>0&&selected.mundial?.length>0&&(
                <span style={{marginLeft:8,padding:"2px 8px",borderRadius:8,background:"rgba(239,68,68,0.1)",color:"#EF4444",fontSize:11}}>⚠️ Cruce</span>
              )}
            </h3>
            {selected.tipo==="recreo"&&selected.evs?.map((ev,i)=><EventCard key={i} ev={ev} expanded={true}/>)}
            {selected.tipo==="mundial"&&selected.evs?.map((ev,i)=><MundialCard key={i} ev={ev}/>)}
            {selected.tipo==="parques"&&selected.evs?.map((ev,i)=><ParquesCard key={i} ev={ev}/>)}
            {selected.tipo==="talleres"&&selected.evs?.map((ev,i)=><TallerCard key={i} ev={ev}/>)}
            {selected.tipo==="combined"&&(
              <>
                {selected.recreo?.length>0&&<><div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:"0.5px"}}>📅 RECREOLAB</div>{selected.recreo.map((ev,i)=><EventCard key={i} ev={ev} expanded={true}/>)}</>}
                {selected.mundial?.length>0&&<><div style={{fontSize:11,color:C.mundial,fontWeight:700,margin:"12px 0 6px",letterSpacing:"0.5px"}}>⚽ MUNDIAL 2026</div>{selected.mundial.map((ev,i)=><MundialCard key={i} ev={ev}/>)}</>}
                {selected.parques?.length>0&&<><div style={{fontSize:11,color:"#22C55E",fontWeight:700,margin:"12px 0 6px",letterSpacing:"0.5px"}}>🛡️ PARQUES</div>{selected.parques.map((ev,i)=><ParquesCard key={i} ev={ev}/>)}</>}
                {selected.talleres?.length>0&&<><div style={{fontSize:11,color:"#6366F1",fontWeight:700,margin:"12px 0 6px",letterSpacing:"0.5px"}}>🎓 TALLERES</div>{selected.talleres.map((ev,i)=><TallerCard key={i} ev={ev}/>)}</>}
              </>
            )}
            <button onClick={()=>setSelected(null)} style={{width:"100%",padding:12,borderRadius:12,border:"none",background:C.bg,color:C.text,fontSize:13,fontWeight:700,cursor:"pointer",marginTop:8}}>Cerrar</button>
          </div>
        </div>
      )}

      <div style={{padding:"8px 20px 20px",textAlign:"center"}}>
        <p style={{fontSize:10,color:C.textDim}}>{events.length} eventos Recreolab · {MUNDIAL.length} partidos Mundial · {PARQUES_SEG.length} actividades Parques · {TALLERES.length} talleres · {retosEvents.length} retos · {source==="live"?"Google Sheets (en vivo)":source==="csv"?"CSV":"datos embebidos"}</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
  </script>
</body>
</html>
